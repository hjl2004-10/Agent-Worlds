<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #content-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }
    </style>
</head>
<body>
    <iframe id="content-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups"></iframe>

    <script>
        const contentFrame = document.getElementById('content-frame');
        let currentBlobUrl = null;

        // 监听来自父窗口的消息
        window.addEventListener('message', function(event) {
            const { type, data } = event.data || {};

            if (type === 'LOAD_HTML') {
                const { html, width, height } = data;

                // 清理旧的 blob URL
                if (currentBlobUrl) {
                    URL.revokeObjectURL(currentBlobUrl);
                    currentBlobUrl = null;
                }

                // 设置 iframe 尺寸
                contentFrame.style.width = width + 'px';
                contentFrame.style.height = height + 'px';

                // 创建 blob 并加载
                const blob = new Blob([html], { type: 'text/html; charset=utf-8' });
                currentBlobUrl = URL.createObjectURL(blob);
                contentFrame.src = currentBlobUrl;

                console.log('[html-viewer] 已加载 HTML, 尺寸:', width, 'x', height);
            }
        });

        // 通知父窗口已准备就绪
        window.parent.postMessage({ type: 'VIEWER_READY' }, '*');
    </script>
</body>
</html>
